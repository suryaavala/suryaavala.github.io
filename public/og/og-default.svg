      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="16%" stop-color="#ffb86c"/>
      <stop offset="33%" stop-color="#f1fa8c"/>
      <stop offset="50%" stop-color="#50fa7b"/>
      <stop offset="66%" stop-color="#8be9fd"/>
      <stop offset="83%" stop-color="#bd93f9"/>
      <stop offset="100%" stop-color="#ff79c6"/>

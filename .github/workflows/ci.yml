# CI — build, test, audit, deploy.
#
# DAG:
#   install → lint → type-check → unit-tests → build ↘
#                                                       e2e ↘
#                                                       lhci → deploy (main only)
#                                                       link-check ↗
#                                                       size-limit ↗
#
# All jobs share a single npm cache keyed on package-lock.json — cache hits
# below are near-instant. Node version is pulled from `.nvmrc` so this file
# stays in sync with local dev and pre-commit.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_OPTIONS: --max-old-space-size=4096
  FORCE_COLOR: '1'

jobs:
  # ---------------------------------------------------------------------------
  # Static gates: cheap, independent, fail fast.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (prettier + eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint

  type-check:
    name: Type-check (astro check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check

  check-deps:
    name: Exact-pinning audit
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check-dep-pinning

  unit-tests:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run test:unit:run

  # ---------------------------------------------------------------------------
  # Build — produces the dist/ artifact consumed by e2e, lhci, link-check,
  # size-limit, and (on main) deploy.
  # ---------------------------------------------------------------------------
  build:
    name: Build (astro)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, type-check, check-deps, unit-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Report staleness warnings
        if: always()
        run: |
          echo "### Staleness audit" >> "$GITHUB_STEP_SUMMARY"
          npm run check-staleness >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Post-build gates — run in parallel against the built dist/.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E + a11y (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        project: [chromium-desktop, webkit-desktop, mobile-chromium]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project == 'webkit-desktop' && 'webkit' || 'chromium' }}
      - name: Run Playwright (${{ matrix.project }})
        env:
          CI: 'true'
        run: npx playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report
            test-results
          retention-days: 30

  lhci:
    name: Lighthouse CI (budgets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Run Lighthouse CI
        run: npm run lhci
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci
          retention-days: 30

  link-check:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config ./lychee.toml
            --root-dir ${{ github.workspace }}/dist
            --verbose
            dist/**/*.html
          fail: true

  size-limit:
    name: Size budget (dist/_astro/*.js ≤ 15 KB gz)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: size-limit
        run: npm run size

  # ---------------------------------------------------------------------------
  # Deploy — only on main, only after every gate above passes.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [e2e, lhci, link-check, size-limit]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          cname: www.suryaavala.com
          commit_message: 'deploy: ${{ github.sha }}'
